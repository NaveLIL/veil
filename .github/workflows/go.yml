name: Go CI

on:
  push:
    branches: [master, main]
    paths:
      - "veil-server/**"
      - ".github/workflows/go.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "veil-server/**"

defaults:
  run:
    working-directory: veil-server

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: veil-server/go.sum

      - name: Download deps
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: staticcheck ./...

  # Placeholder for future Go tests
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: veil-server/go.sum

      - name: Run tests
        run: go test -v -race -timeout 60s ./...

name: Coverage

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    # Coverage is informational — never blocks merge
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsecret-1-dev

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: coverage-${{ hashFiles('**/Cargo.toml') }}

      - name: Generate coverage
        run: |
          mkdir -p coverage
          cargo tarpaulin \
            --workspace \
            --exclude veil-desktop \
            --exclude veil-share-viewer \
            --exclude veil-ffi \
            --exclude-files "*/tests/*" \
            --exclude-files "*/benches/*" \
            --out xml \
            --out html \
            --output-dir coverage/ \
            --timeout 600 \
            --skip-clean \
            2>&1 | tee coverage/tarpaulin.log
          SUMMARY=$(grep -E "^[0-9]+\.[0-9]+% coverage" coverage/tarpaulin.log || echo "Coverage data unavailable")
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "\`$SUMMARY\`" >> $GITHUB_STEP_SUMMARY
          echo "See uploaded artifact for full HTML report." >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

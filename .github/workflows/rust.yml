name: Rust CI

on:
  push:
    branches: [master, main]
    paths:
      - "veil-crypto/**"
      - "veil-store/**"
      - "veil-client/**"
      - "veil-ffi/**"
      - "veil-desktop/src-tauri/**"
      - "veil-share-viewer/**"
      - "Cargo.toml"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "veil-crypto/**"
      - "veil-store/**"
      - "veil-client/**"
      - "veil-ffi/**"
      - "veil-desktop/src-tauri/**"
      - "veil-share-viewer/**"
      - "Cargo.toml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsecret-1-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace -- --nocapture
        env:
          RUST_BACKTRACE: 1

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: wasm-cargo-${{ hashFiles('veil-share-viewer/Cargo.toml', 'veil-crypto/Cargo.toml') }}

      - name: Build share-viewer for WASM
        run: cargo build -p veil-share-viewer --target wasm32-unknown-unknown --release

  bench:
    name: Benchmarks (check only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build benchmarks (no run)
        run: cargo bench -p veil-crypto --no-run

syntax = "proto3";
package veil.v1;

option go_package = "github.com/AegisSec/veil-server/pkg/proto/v1";

enum PresenceStatus {
  PRESENCE_UNKNOWN = 0;
  PRESENCE_ONLINE = 1;
  PRESENCE_OFFLINE = 2;
  PRESENCE_AWAY = 3;
  PRESENCE_DND = 4;
}

message PresenceUpdate {
  bytes identity_key = 1;
  PresenceStatus status = 2;
  optional string status_text = 3;
  optional uint64 last_seen = 4;  // timestamp
}

message TypingEvent {
  string conversation_id = 1;
  bytes identity_key = 2;
  bool started = 3;  // true = started typing, false = stopped
}

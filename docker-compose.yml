version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veil
      POSTGRES_USER: veil
      POSTGRES_PASSWORD: veildev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./veil-server/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veil"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ./veil-server
      dockerfile: Dockerfile
    ports:
      - "9080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://veil:veildev@postgres:5432/veil?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
